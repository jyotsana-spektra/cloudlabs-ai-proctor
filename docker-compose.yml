version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: deployments/Dockerfile

    container_name: cloudlabs-ai-proctor-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped

  frontend:
    image: node:20

    working_dir: /app/frontend

    volumes:
      - ./frontend:/app/frontend

    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0"

    ports:
      - "5173:5173"

    depends_on:
      - backend
